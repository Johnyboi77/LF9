<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Login – Heiner IT-Systems GmbH</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e3a5f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 48px 52px;
      width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .card h1 {
      font-size: 1.6rem;
      color: #1e3a5f;
      text-align: center;
      margin-bottom: 4px;
    }

    .card .sub {
      text-align: center;
      color: #95a5a6;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select, input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dce3ea;
      border-radius: 6px;
      font-size: 1rem;
      color: #2c3e50;
      background: #f8f9fa;
      margin-bottom: 22px;
      transition: border-color 0.2s;
      outline: none;
    }

    select:focus, input[type="password"]:focus {
      border-color: #2980b9;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    button:hover { background: #1a6fa8; }

    .error {
      background: #fdecea;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 28px;
      color: #4a6fa5;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Heiner IT-Systems GmbH</h1>
    <p class="sub">Browser-GUI (Bonus) · Datenbank-Verwaltungssystem</p>

    {% if fehler %}
      <div class="error">{{ fehler }}</div>
    {% endif %}

    <form method="POST">
      <label for="abteilung">Abteilung</label>
      <select id="abteilung" name="abteilung">
        {% for abt in abteilungen %}
          <option>{{ abt }}</option>
        {% endfor %}
      </select>

      <label for="passwort">Passwort</label>
      <input type="password" id="passwort" name="passwort"
             placeholder="Passwort eingeben" autofocus>

      <button type="submit">Anmelden</button>
    </form>
  </div>

  <footer>LF9 Projekt &middot; Heiner IT-Systems GmbH &middot; 2026</footer>
</body>
</html>
